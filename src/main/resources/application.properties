# Spring Config Import for Local Secrets (Ignored by Git)
spring.config.import=optional:classpath:application-secrets.properties

# Database URL, Username, and Password Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/aquatrack?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Krishna81@}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Database Connection Pool Configurations
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# JPA / Hibernate Configurations
